name: CI

# Quality gate for Fresh Origins. Vercel handles deploys (preview on every PR,
# production on push to main); this workflow only runs checks and reports status.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        # The app degrades gracefully when Supabase env vars are absent
        # (see hasSupabaseEnv / hasSupabaseAdminEnv guards), so the build needs
        # no real secrets. We pass safe placeholders only to silence anything
        # that reads an env at build time. NEVER put real keys here — real
        # values live in Vercel's project settings.
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://www.freshoriginsmart.com
          NEXT_PUBLIC_SITE_NAME: Fresh Origins
          NEXT_PUBLIC_WHATSAPP_NUMBER: "910000000000"
          NEXT_PUBLIC_FEATURE_ONLINE_CHECKOUT: "false"

  security:
    name: Dependency audit · Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks needs full history to scan all commits on a push.
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+ severity, non-blocking)
        # Reported for visibility but does not fail the build, so a transitive
        # advisory can't block shipping. Review the log and patch deliberately.
        run: npm audit --audit-level=high || true

      - name: Guard against committed .env files
        run: |
          if git ls-files | grep -E '(^|/)\.env(\..*)?$' | grep -vE '\.env\.example$'; then
            echo "::error::A real .env file is tracked by git. Remove it and rotate any exposed keys."
            exit 1
          fi
          echo "No tracked .env files (only .env.example, which is fine)."

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
